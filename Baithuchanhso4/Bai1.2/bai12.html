<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý sinh viên</title>

<style>

body{
font-family:Arial;
padding:20px;
}

input,select,button{
padding:6px;
margin-right:10px;
}

table{
border-collapse: collapse;
margin-top:15px;
width:700px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#eee;
cursor:pointer;
}

.weak{
background:yellow;
}

</style>

</head>
<body>

<h2>Quản lý sinh viên</h2>

<input id="name" placeholder="Họ tên">
<input id="score" type="number" placeholder="Điểm (0-10)">
<button id="addBtn">Thêm</button>

<br><br>

<input id="search" placeholder="Tìm kiếm tên">

<select id="filter">
<option value="all">Tất cả</option>
<option value="Giỏi">Giỏi</option>
<option value="Khá">Khá</option>
<option value="Trung bình">Trung bình</option>
<option value="Yếu">Yếu</option>
</select>

<table>

<thead>
<tr>
<th>STT</th>
<th>Họ tên</th>
<th id="scoreHeader">Điểm</th>
<th>Xếp loại</th>
<th>Thao tác</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<p id="stats"></p>
<p id="noResult"></p>

<script src="bai12.js"></script>

</body>
</html>
